<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OftalmoPro - Clinical Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; transition: background 0.3s; }
        .snellen-font { font-family: "Courier New", Courier, monospace; font-weight: 900; letter-spacing: 0.5rem; }
        .dark-mode { background-color: #1a202c; color: #e2e8f0; }
        .dark-mode .bg-white { background-color: #2d3748; color: #edf2f7; }
        .amsler-grid {
            display: grid;
            grid-template-columns: repeat(20, 15px);
            grid-template-rows: repeat(20, 15px);
            border: 2px solid #333;
            background-color: white;
        }
        .amsler-grid div { border: 0.1px solid #ddd; }
        .center-dot { background-color: red !important; border-radius: 50%; scale: 1.5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-indigo-700 text-white p-4 shadow-xl flex justify-between items-center px-8">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-eye mr-2"></i>OftalmoPro Suite</h1>
        <button onclick="toggleDarkMode()" class="p-2 bg-indigo-600 rounded-full hover:bg-indigo-500 transition">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>

    <div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-indigo-600 mb-4 uppercase text-sm tracking-wider">Optotipos Snellen</h2>
                <div class="bg-white p-4 text-center rounded-lg border-2 border-slate-100 text-black">
                    <div class="text-5xl snellen-font mb-2"> E </div>
                    <div class="text-3xl snellen-font mb-2"> F P </div>
                    <div class="text-2xl snellen-font mb-2"> T O Z </div>
                    <div class="text-xl snellen-font"> L P E D </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-indigo-600 mb-4 uppercase text-sm tracking-wider">Conversor Agudeza</h2>
                <input id="snellenIn" type="text" placeholder="Ej: 20/40" class="w-full p-2 border rounded mb-2 text-slate-800">
                <button onclick="convertAV()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Convertir</button>
                <div id="avRes" class="mt-3 text-sm space-y-1"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-indigo-600 mb-4 uppercase text-sm tracking-wider">Cálculo LIO (SRK-II)</h2>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <input id="constA" type="number" step="0.1" value="118.5" class="p-2 border rounded" placeholder="A">
                    <input id="axl" type="number" step="0.01" class="p-2 border rounded" placeholder="Axial (mm)">
                    <input id="k1" type="number" step="0.1" class="p-2 border rounded" placeholder="K1">
                    <input id="k2" type="number" step="0.1" class="p-2 border rounded" placeholder="K2">
                </div>
                <button onclick="calcLIO()" class="w-full mt-4 bg-emerald-600 text-white py-2 rounded-lg font-bold uppercase text-xs">Calcular Poder</button>
                <p id="lioRes" class="text-center mt-3 text-xl font-bold text-emerald-600"></p>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center">
                <h2 class="font-bold text-indigo-600 mb-4 uppercase text-sm tracking-wider text-left">Rejilla de Amsler</h2>
                <div class="amsler-grid mx-auto" id="amsler"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-indigo-600 mb-4 uppercase text-sm tracking-wider">Test Daltonismo</h2>
                <div class="relative w-32 h-32 mx-auto bg-orange-100 rounded-full flex items-center justify-center border-4 border-orange-200 overflow-hidden">
                    <div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle,_#ff0000_2px,_transparent_2px)] bg-[size:10px_10px]"></div>
                    <span class="text-5xl font-black text-green-700 z-10">74</span>
                </div>
                <p class="text-center text-xs mt-4 text-slate-500 italic">Normal ve 74. Daltonismo puede ver 21 o nada.</p>
            </div>

            <div class="bg-indigo-900 text-white p-5 rounded-2xl shadow-lg">
                <h2 class="font-bold mb-2 uppercase text-sm tracking-wider">Notas Rápidas</h2>
                <textarea class="w-full bg-indigo-800 border-none rounded p-2 text-sm h-32" placeholder="Anotaciones de la consulta..."></textarea>
            </div>
        </div>

    </div>

    <script>
        // Lógica de Agudeza Visual
        function convertAV() {
            const val = document.getElementById('snellenIn').value; // Ej: 20/40
            const parts = val.split('/');
            if(parts.length === 2) {
                const decimal = (parseInt(parts[0]) / parseInt(parts[1])).toFixed(2);
                const logmar = Math.log10(1/decimal).toFixed(2);
                document.getElementById('avRes').innerHTML = `
                    <p><b>Decimal:</b> ${decimal}</p>
                    <p><b>LogMAR:</b> ${logmar}</p>
                `;
            }
        }

        // Lógica LIO Mejorada (Promediando Ks)
        function calcLIO() {
            const A = parseFloat(document.getElementById('constA').value);
            const L = parseFloat(document.getElementById('axl').value);
            const k1 = parseFloat(document.getElementById('k1').value);
            const k2 = parseFloat(document.getElementById('k2').value);
            
            if(A && L && k1 && k2) {
                const avgK = (k1 + k2) / 2;
                const P = A - (2.5 * L) - (0.9 * avgK);
                document.getElementById('lioRes').innerText = P.toFixed(2) + " D";
            }
        }

        // Modo Oscuro
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        // Generar Rejilla
        const amsler = document.getElementById('amsler');
        for (let i = 0; i < 400; i++) {
            const cell = document.createElement('div');
            if (i === 210) cell.classList.add('center-dot');
            amsler.appendChild(cell);
        }
    </script>
</body>
</html>
